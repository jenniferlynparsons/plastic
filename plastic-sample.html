<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>plastic sample game</title>
  <link rel="stylesheet" href="/css/reset.css" media="screen" title="no title" charset="utf-8">
  <style media="screen">
    .box {
      padding: 1em;
    }
    label{
      display: block;
    }
    p{
      padding: .5em 0;
    }
    input[type=button], input[type=text]{
      margin: 1em 0;
    }
  </style>
  <script type="text/javascript" src="plastic-phase1.js"></script>
</head>
<body>
  <div class="box">
    <p>WELCOME! You're now playing a game.</p>
    <p>Start by naming your character and deciding on a class.</p>
    <form class="" action="index.html" method="post">
      <input type="text" name="name" value="Enter Character's Name">
      <label><input type="radio" name="class" value="Mage"> Mage</label>
      <label><input type="radio" name="class" value="Rogue"> Rogue</label>
      <label><input type="radio" name="class" value="Warrior"> Warrior</label>
      <input type="button" name="name" value="Create Character">
    </form>
  </div>
</body>
</html>
